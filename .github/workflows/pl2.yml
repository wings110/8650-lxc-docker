name: 11223sctp-newтіажђЪуЅѕТъёт╗║ 6.1.118 ТгДтіауюЪOKIтєЁТаИ

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android14'
  KERNEL_VERSION: '6.1'
  SUB_VERSION: '118'
  KERNEL_NAME: 'android14-11-o-gca13bffobf09'
  CCACHE_KEY: ccache-lxc-6.1.118

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSUтѕєТћ»(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(тјЪуЅѕ)/ТЌатєЁуй«KSU,ж╗ўУ«цReSukiSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      vmlinux_debug:
        description: 'сђљС║ЉуФ» ABI ТјњжЏисђЉС╗Ёу╝ќУ»Љт╣ХСй┐уће pahole ТЈљтЈќу╗ЊТъёСйЊти«т╝ѓТіЦтЉі (Уи│У┐ЄТЎ«жђџтѕиТю║тїЁТЅЊтїЁ)'
        required: true
        type: boolean
        default: false
      susfs_enable:
        description: 'Тў»тљдт╝ђтљ»susfs(ућеС║јтбът╝║жџљУЌЈуј»тбЃТїѓУййтіЪУЃй; тЈ»УЃйУй╗тЙ«тбътіаУђЌућх№╝їСИіТИИТЏ┤Тќ░т»╝УЄ┤СИЇуе│т«џТЌХТѕќСИЇжюђУдЂтЈ»тЁ│жЌГ)'
        required: true
        type: boolean
        default: true
      kpm_enable:
        description: 'Тў»тљдт╝ђтљ»kpm(builtin-Сй┐уће(re)sukisuтєЁуй«kpm, kpn-Сй┐ућеуІгуФІkpmт«ъуј░(Тћ»ТїЂС╗╗ТёЈKSU/жЮбтЁиуј»тбЃ); СИЇжюђУдЂтЈ»С┐ЮТїЂж╗ўУ«цтЁ│жЌГ)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: 'Тў»тљдт«ЅУБЁ lz4 1.10.0+zstd 1.5.7 УАЦСИЂтЈі LZ4KD УАЦСИЂ'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: 'Тў»тљдт«ЅУБЁ LZ4KD УАЦСИЂ(УІЦти▓т╝ђтљ»lz4+zstdУАЦСИЂтѕЎтЈ»СИЇт╝ђтљ»)'
        required: true
        type: boolean
        default: false
      bbr_enable:
        description: 'Тў»тљдтљ»ућеbbrу«ЌТ│Ћ(С╝ўтїќСИіУАїТЋ░ТЇ«,т»╣ТЅІТю║ТЌЦућеТЌатцфтцДТёЈС╣ЅућџУЄ│тЈ»УЃйУ┤ЪС╝ўтїќ;falseтЁ│жЌГ,trueС╗ЁтіатЁЦу«ЌТ│Ћ,defaultУ«ЙСИ║ж╗ўУ«ц)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: 'Тў»тљдт╝ђтљ»уйЉу╗ютіЪУЃйТІЊт▒ЋжЁЇуй«(ућеС║јСИ║ipsetтЈіжюђУдЂiptablesуГЅжФўу║ДуйЉу╗ютіЪУЃйтєЁТаИТћ»ТїЂуџёуеІт║ЈТЈљСЙЏТћ»ТїЂ)'
        required: true
        type: boolean
        default: false
      ssg_enable:
        description: 'Тў»тљдтљ»ућеСИЅТўЪSSG IOУ░Ѓт║дтЎеТћ»ТїЂ(ТЈљтЇЄIOУ»╗тєЎТђДУЃй; тюеСИђтіа12СИітЈ»УЃйт»╝УЄ┤bug)'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: 'Тў»тљдтљ»ућеRe-KernelТћ»ТїЂ(СИјFreezer/NoActiveуГЅУй»С╗ХжЁЇтљѕ, ТЈљтЇЄт║ћућетє╗у╗ЊУЃйтіЏ)'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: 'Тў»тљдт╝ђтљ»тєЁТаИу║ДтЪ║тИдС┐ЮТіц(жў╗ТГбСИђтѕЄт»╣жЮъућеТѕитѕєтї║уџётєЎтЁЦ№╝їТюЅТЋѕжў▓ТГбТа╝Тю║)'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: 'ТЏ┤Тќ░ccacheу╝ЊтГў(т░єТюгТгАу╝ќУ»ЉућЪТѕљуџёccacheу╝ЊтГўУдєуЏќУЄ│С╗Њт║Њу╝ЊтГў№╝їтюеТЏ┤Тћ╣у╝ќУ»ЉжЁЇуй«сђЂТ║љуаЂТѕќжюђУдЂтѕиТќ░у╝ЊтГўТЌХт╝ђтљ»)'
        required: true
        type: boolean
        default: false
      ccache_debug:
        description: 'Тў»тљдСИіС╝а CcacheУ░ЃУ»ЋТЌЦт┐Ќ(ућеС║јУ░ЃУ»Ћ, ТЌажюђУдЂСИЇт┐Ёт╝ђтљ»)'
        required: true
        type: boolean
        default: false
      kernel_suffix:
        description: 'тєЁТаИтљју╝ђ(уЋЎуЕ║ж╗ўУ«ц,т╝ђтц┤тѕФтіаУ┐ътГЌугд,тІ┐тіауЕ║Та╝уГЅтй▒тЊЇТїЄС╗цУ┐љУАїуџёС┐ЮуЋЎтГЌугд)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: жЄіТћЙуБЂуЏўуЕ║жЌ┤ (УДБтє│тљјтЈ░ I/O С║ЅТібжЌ«жбў)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: т«ЅУБЁуј»тбЃСЙЮУхќ+тѕЮтДІтїќТ║љуаЂС╗Њт║ЊтЈіllvm-Clang20тиЦтЁижЊЙ
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "тйЊтЅЇС╗Њт║Њ№╝џ$GITHUB_REPOSITORY"
          echo "тйЊтЅЇтѕєТћ»№╝џ$GITHUB_REF_NAME"
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev zstd dwarves zip pkg-config
          
          echo "ТГБтюетЁІжџєТ║љуаЂС╗Њт║Њ..."
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8650/archive/refs/heads/oneplus/sm8650_b_16.0.0_oneplus12.zip -o common.zip && 
          unzip -q common.zip && 
          mv "android_kernel_common_oneplus_sm8650-oneplus-sm8650_b_16.0.0_oneplus12" common &&
          rm -rf common.zip &
          
          echo "ТГБтюетЁІжџєllvm-Clang20тиЦтЁижЊЙ..." &&
          mkdir -p clang20 &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip -o clang.zip &&
          unzip -q clang.zip -d clang20 &&
          rm -rf clang.zip &
          
          echo "ТГБтюетЁІжџєТъёт╗║тиЦтЁи..." &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip -o build-tools.zip &&
          unzip -q build-tools.zip &&
          rm -rf build-tools.zip &
          
          wait
          echo "ТЅђТюЅТ║љуаЂтЈіllvm-Clang20тиЦтЁижЊЙтѕЮтДІтїќт«їТѕљ№╝Ђ"
          echo "ТГБтюетј╗жЎц ABI С┐ЮТіц & тј╗жЎц dirty тљју╝ђ..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: жЁЇуй«ccacheуЏ«тйЋ
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV
          echo "тйЊтЅЇуБЂуЏўуЕ║жЌ┤№╝џ"
          df -h
          echo "тйЊтЅЇТъёт╗║тєЁТаИуЅѕТюг№╝џ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}"

      - name: УййтЁЦтйЊтЅЇуЅѕТюгтєЁТаИуџё ccacheу╝ЊтГў
        uses: actions/cache@v5
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: ТІЅтЈќтЁгтЁ▒жбёуй« ccache у╝ЊтГў
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "ТБђТЪЦТюгтю░у╝ЊтГўуіХТђЂ..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "ТБђТхІтѕ░Тюгтю░ти▓ТѕљтіЪУййтЁЦ ccache у╝ЊтГў№╝їУи│У┐ЄтЁгтЁ▒ ccache ТІЅтЈќ№╝Ђ"
            exit 0
          fi
          
          echo "ТюфтЉйСИГу╝ЊтГў№╝їт░ЮУ»ЋТІЅтЈќТюђТќ░тЁгтЁ▒ ccache ..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "ТѕљтіЪСИІУйй $FILE_NAME№╝їТГБтюеУДБтјІ..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "тЁгтЁ▒ ccache ТЂбтцЇт«їТѕљ№╝Ђ"
          else
            echo "тЁгтЁ▒ ccache СИГТюфТЅЙтѕ░т»╣т║ћуџё ccache ТќЄС╗Х№╝їт░єУ┐ЏУАїтЁежЄЈтЁеТќ░у╝ќУ»Љ..."
          fi

      - name: т«ЅУБЁ ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          ccache --version

      - name: ТИЁжЎцТЌД ccache у╝ЊтГў
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "ТГБтюеТИЁжЎцС╗Њт║ЊСИГуџёТЌД ccache у╝ЊтГў..."
          if gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "ТѕљтіЪтѕажЎцТЌДуџё ccache у╝ЊтГў№╝Ђ"
          else
            echo "ТЌДу╝ЊтГўСИЇтГўтюеТѕќти▓УбФТИЁуљє№╝Ђ"
          fi
      
      - name: тѕЮтДІтїќт╣ХжЁЇуй«ccache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          echo ">>> 1. ТБђТЪЦуБЂуЏўтЅЕСйЎуЕ║жЌ┤..."
          df -h
          
          echo ">>> 2. тЄђтїќу╝ЊтГўуЏ«тйЋТЮЃжЎљСИјжЁЇуй«..."
          mkdir -p "$CCACHE_DIR"
          chmod -R 777 "$CCACHE_DIR" || true
          rm -f "$CCACHE_DIR/ccache.conf"
          
          echo ">>> 3. жЁЇуй«ccacheу╝ЊтГўтцДт░ЈСИ║: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          echo ">>> 4. ccacheтѕЮтДІуіХТђЂ:"
          ccache -s
          
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "ccacheу╝ЊтГўтЉйСИГУ»дТЃЁ:"
            ccache -sv
          fi

      - name: Ти╗тіаKernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            echo "ТГБтюежЁЇуй«SukiSU Ultra..."
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            export KSU_VERSION=$KSU_VERSION
            for i in {1..3}; do
              KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | grep -m1 "KSU_VERSION_API :=" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
              [ -n "$KSU_API_VERSION" ] && break || sleep 1
            done
            [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"
            echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'@wings110\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'@wings110'
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild
            sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild
            awk -v def="$VERSION_DEFINITIONS" '/REPO_OWNER :=/ {print; print def; inserted=1; next} 1 END {if (!inserted) print def}' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild
            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            grep -A10 "REPO_OWNER" kernel/Kbuild
            grep "KSU_VERSION_FULL" kernel/Kbuild
            echo "SukiSUуЅѕТюгтЈи: v${KSU_API_VERSION}-${GIT_COMMIT_HASH}@wings110"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            echo "ТГБтюежЁЇуй«ReSukiSU..."
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@wings110"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            echo "ТГБтюежЁЇуй«KernelSU Next..."
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            cd KernelSU-Next
            rm -rf .git
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=dev&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" kernel/Kbuild
            KSU_GIT_TAG=$(curl -sL "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/tags" | grep -o '"name": *"[^"]*"' | head -n 1 | sed 's/"name": "//;s/"//')
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" kernel/Kbuild
            cd ../common/drivers/kernelsu
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/apk_sign.patch
            patch -p2 -N -F 3 < apk_sign.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "ТГБтюежЁЇуй«тјЪуЅѕ KernelSU (tiann/KernelSU)..."
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          else
            echo "ти▓жђЅТІЕТЌатєЁуй«KernelSUТеАт╝Ј№╝їУи│У┐ЄKernelSUжЁЇуй«..."
          fi

      - name: т║ћуће KernelSU & SUSFS УАЦСИЂ
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} != "none" ]]; then
            echo "ТГБтюеТи╗тіаsusfsУАЦСИЂ..."
            git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
            cd ..
          else
            echo "ти▓жђЅТІЕТЌатєЁуй«KernelSUТеАт╝Ј№╝їУи│У┐ЄsusfsжЁЇуй«..."
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "ТГБтюеСИ║тјЪуЅѕ KernelSU (tiann/KernelSU)Ти╗тіаУАЦСИЂ..."
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            cd ./KernelSU
            patch -p1 < 10_enable_susfs_for_ksu.patch || true
          fi
          
      - name: т║ћућеlz4 1.10.0 & zstd 1.5.7УАЦСИЂ
        if: inputs.lz4_enable
        run: |
          echo "ТГБтюеТи╗тіаlz4 1.10.0 & zstd 1.5.7УАЦСИЂРђд"
          cd kernel_workspace
          git clone --depth=1 https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git -b ${{ github.ref_name }} ${{ github.actor }}
          cp ./${{ github.actor }}/zram_patch/001-lz4.patch ./common/
          cp ./${{ github.actor }}/zram_patch/lz4armv8.S ./common/lib
          cp ./${{ github.actor }}/zram_patch/002-zstd.patch ./common/
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: т║ћуће lz4kd УАЦСИЂ
        if: inputs.lz4kd_enable
        run: |
          echo "ТГБтюеТи╗тіаlz4kdУАЦСИЂРђд"
          cd kernel_workspace
          if [ ! -d "SukiSU_patch" ]; then
            git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git
          fi
          cd common
          cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./lib
          cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
          cp ../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true
          
      - name: Ти╗тіаSUSFS жЁЇуй«жА╣
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          
      - name: Ти╗тіа KSU & тЁХС╗ќжЁЇуй«жА╣
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' && ( "${{ github.event.inputs.ksu_type }}" == "sukisu" || "${{ github.event.inputs.ksu_type }}" == "resukisu" ) ]]; then
            echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          if [[ "${{ github.event.inputs.susfs_enable }}" == "false" ]]; then
            echo "CONFIG_KSU_SUSFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ ${{ github.event.inputs.lz4kd_enable }} == 'true' ]]; then
            echo "CONFIG_ZSMALLOC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4K=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_842=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/check_defconfig//' ./common/build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> ./common/arch/arm64/configs/gki_defconfig
          
      - name: тљ»ућеуйЉу╗ютіЪУЃйтбът╝║С╝ўтїќжЁЇуй« (т╣Хт╝ђтљ» SCTP тіЪУЃй)
        if: inputs.better_net
        run: |
          cd kernel_workspace
          echo "CONFIG_BPF_STREAM_PARSER=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NETFILTER_XT_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_MAX=65534" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_MAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_LIST_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_NAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y" >> ./common/arch/arm64/configs/gki_defconfig
          # ТГБт╝Јт╝ђтљ» SCTP у╝ќУ»Љ
          echo "CONFIG_IP_SCTP=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd common
          wget --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/other_patch/config.patch
          patch -p1 -F 3 < config.patch || true

      - name: Ти╗тіа BBR уГЅСИђу│╗тѕЌТІЦтАъТјДтѕХу«ЌТ│Ћ
        run: |
          if [[ "${{ github.event.inputs.bbr_enable }}" != "false" ]]; then
            echo "ТГБтюеТи╗тіаBBRуГЅТІЦтАъТјДтѕХу«ЌТ│Ћ..."
            cd kernel_workspace
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_CUBIC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_VEGAS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_NV=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_WESTWOOD=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_HTCP=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_BRUTAL=y" >> ./common/arch/arm64/configs/gki_defconfig
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "ТГБтюет░єBBRУ«ЙСИ║ж╗ўУ«цТІЦтАъТјДтѕХу«ЌТ│Ћ..."
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
            else
              echo "CONFIG_DEFAULT_TCP_CONG=cubic" >> ./common/arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: тљ»ућеСИЅТўЪSSG IOУ░Ѓт║дтЎе
        if: inputs.ssg_enable
        run: |
          echo "ТГБтюетљ»ућеСИЅТўЪSSG IOУ░Ѓт║дтЎе(СИђтіа12уГЅТъЂт░ЉТЋ░Тю║тъІт╝ђтљ»тљјтЈ»УЃйСИЇт╝ђТю║,УІЦтЄ║уј░bugУ»итЁ│жЌГТГцжА╣)Рђд"
          cd kernel_workspace
          echo "CONFIG_MQ_IOSCHED_SSG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MQ_IOSCHED_SSG_CGROUP=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: тљ»ућеRe-KernelТћ»ТїЂ
        if: inputs.rekernel_enable
        run: |
          echo "ТГБтюетљ»ућеRe-KernelТћ»ТїЂ(ућеС║јСИјFreezer,NoActiveуГЅУй»С╗ХжЁЇтљѕСй┐уће,ТЈљтЇЄтє╗у╗ЊтљјтЈ░УЃйтіЏ)Рђд"
          cd kernel_workspace
          echo "CONFIG_REKERNEL=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: тљ»ућетєЁТаИу║ДтЪ║тИдС┐ЮТіц
        if: inputs.baseband_guard
        run: |
          echo "ТГБтюетљ»ућетљ»ућетєЁТаИу║ДтЪ║тИдС┐ЮТіцТћ»ТїЂРђд"
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: жЁЇуй«Тћ»ТїЂlxc-dockerС╗╗тіА
        run: |
          echo "ТГБтюежЁЇуй«Тћ»ТїЂlxc-dockerС╗╗тіАРђд"
          cd kernel_workspace
          
          # 1. тЁІжџєтїЁтљФУАЦСИЂуџёС╗Њт║Њтѕ░уЅ╣т«џуџёСИ┤ТЌХТќЄС╗Хтц╣
          git clone --depth=1 https://github.com/wings110/8650-lxc-docker.git lxc_fix
          
          # 2. т║ћућеТЅђТюЅ .patch УАЦСИЂ (тЏаСИ║УАЦСИЂтєЁжЃетИдТюЅ common/ тЅЇу╝ђ№╝їуЏ┤ТјЦтюе kernel_workspace СИІТЅЊУАЦСИЂ)
          for patch_file in ./lxc_fix/lxc-patches/*.patch; do
            if [ -f "$patch_file" ]; then
              echo "ТГБтюет║ћућеУАЦСИЂ: $patch_file"
              # Ті╣жЎц Windows ТЇбУАїугд№╝їжў▓ТГб patch тц▒У┤Ц
              sed -i 's/\r$//' "$patch_file"
              patch -p1 -F 3 < "$patch_file" || true
            fi
          done
          
          # 3. ТЅДУАї SCTP Т║љуаЂС┐«тцЇУёџТюг
          echo ">>> ТЅДУАї SCTP Т║љуаЂС┐«тцЇУёџТюг..."
          SCRIPT_PATH="./lxc_fix/lxc-patches/sctp_source_fix.sh"
          
          if [ -f "$SCRIPT_PATH" ]; then
            echo "ТЅЙтѕ░УёџТюг№╝їТГБтюеТЅДУАї..."
            # Ті╣жЎц Windows ТЇбУАїугд№╝їжў▓ТГбУёџТюгТЅДУАїтц▒У┤Ц
            sed -i 's/\r$//' "$SCRIPT_PATH"
            bash "$SCRIPT_PATH"
          else
            echo "РЮї СИЦжЄЇжћЎУ»»№╝џТюфТЅЙтѕ░С┐«тцЇУёџТюг $SCRIPT_PATH"
            ls -la ./lxc_fix/lxc-patches/ || true
            exit 1
          fi

      - name: Ти╗тіатѕХСйютљЇуД░
        run: |
          cd kernel_workspace
          echo "ТЏ┐ТЇбтєЁТаИуЅѕТюгтљју╝ђ..."
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            echo "тйЊтЅЇтєЁТаИуЅѕТюгтљју╝ђ№╝џ${{ github.event.inputs.kernel_suffix }}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ github.event.inputs.kernel_suffix }}\"|" "$f"
            done
          else
            echo "тйЊтЅЇтєЁТаИуЅѕТюгтљју╝ђ№╝џ${{ env.KERNEL_NAME }}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ env.KERNEL_NAME }}\"|" "$f"
            done
          fi

      # ================== ТаИт┐ЃтЇЄу║Д№╝џС║ЉуФ»СИђжћ«ТЈљтЈќСИјТЅЙУїг ==================
      - name: сђљС║ЉуФ» ABI ТјњжЏисђЉу╝ќУ»Љт╣ХТЈљтЈќу╗ЊТъёСйЊтѕєТъљТіЦтЉі
        if: inputs.vmlinux_debug == true
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang20/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          
          # сђљТаИт┐ЃС┐«тцЇсђЉ№╝џт╝║УАїТЅЊжђџ Android LLVM СИј Ubuntu т«┐СИ╗Тю║уџётц┤ТќЄС╗Х/т║ЊТќЄС╗Хжџћуд╗тбЎ
          export C_INCLUDE_PATH="/usr/include:/usr/include/x86_64-linux-gnu"
          export CPLUS_INCLUDE_PATH="/usr/include:/usr/include/x86_64-linux-gnu"
          export LIBRARY_PATH="/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu"
          
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          
          cd kernel_workspace/common
          
          wget --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/lib/libfakestat.so || true
          wget --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/lib/libfaketimeMT.so || true
          chmod 777 ./*.so || true
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          chmod +x cc-wrapper ld-wrapper
          
          echo "========================================="
          echo ">>> 1. у╝ќУ»Љт»╣уЁДу╗ё (OFF) т╣ХућЪТѕљТіЦтЉі ..."
          echo "========================================="
          echo "# CONFIG_IP_SCTP is not set" >> arch/arm64/configs/gki_defconfig
          
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld HOSTCFLAGS="-I/usr/include" HOSTLDFLAGS="-L/usr/lib/x86_64-linux-gnu" O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld HOSTCFLAGS="-I/usr/include" HOSTLDFLAGS="-L/usr/lib/x86_64-linux-gnu" O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error vmlinux
          
          echo ">>> ТЈљтЈќт»╣уЁДу╗ё struct net тњї struct sk_buff у╗ЊТъё..."
          pahole -C net out/vmlinux > ../net_off.txt
          pahole -C sk_buff out/vmlinux > ../skb_off.txt
          
          echo "========================================="
          echo ">>> 2. у╝ќУ»Љт«ъжфїу╗ё (ON) т╣ХућЪТѕљТіЦтЉі ..."
          echo "========================================="
          echo "CONFIG_IP_SCTP=y" >> arch/arm64/configs/gki_defconfig
          
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld HOSTCFLAGS="-I/usr/include" HOSTLDFLAGS="-L/usr/lib/x86_64-linux-gnu" O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld HOSTCFLAGS="-I/usr/include" HOSTLDFLAGS="-L/usr/lib/x86_64-linux-gnu" O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error vmlinux
          
          echo ">>> ТЈљтЈќт«ъжфїу╗ё struct net тњї struct sk_buff у╗ЊТъё..."
          pahole -C net out/vmlinux > ../net_on.txt
          pahole -C sk_buff out/vmlinux > ../skb_on.txt
          
          echo "========================================="
          echo ">>> 3. тюеС║ЉуФ»У┐ЏУАї diff ти«т╝ѓТ»ћт»╣ ..."
          echo "========================================="
          cd ..
          diff -u net_off.txt net_on.txt > abi_diff_net_report.txt || true
          diff -u skb_off.txt skb_on.txt > abi_diff_skb_report.txt || true
          
          echo ">>> ТГБтюеТЅЊтїЁТЅђТюЅТќЄТюгТіЦтЉі..."
          zip abi_analysis_reports.zip net_off.txt net_on.txt skb_off.txt skb_on.txt abi_diff_net_report.txt abi_diff_skb_report.txt
          echo "РюЁ С║ЉуФ»ТјњжЏитѕєТъљт«їТѕљ№╝ЂтЄєтцЄСИіС╝атјІу╝ЕтїЁсђѓ"

      - name: СИіС╝а ABI тѕєТъљТіЦтЉі (ТјњжЏиСИЊуће)
        if: inputs.vmlinux_debug == true
        uses: actions/upload-artifact@v4
        with:
          name: abi_analysis_reports
          path: ${{ github.workspace }}/kernel_workspace/abi_analysis_reports.zip
          compression-level: 0

      # ================== С╗ЦСИІСИ║тИИУДётѕиТю║тїЁТхЂуеІ (ТјњжЏиТеАт╝ЈСИІУбФТІдТѕф) ==================
      - name: Тъёт╗║тєЁТаИ (у║»тЄђтіажђЪуЅѕ)
        if: inputs.vmlinux_debug == false
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang20/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          
          # сђљТаИт┐ЃС┐«тцЇсђЉ№╝џт╝║УАїТЅЊжђџ Android LLVM СИј Ubuntu т«┐СИ╗Тю║уџётц┤ТќЄС╗Х/т║ЊТќЄС╗Хжџћуд╗тбЎ
          export C_INCLUDE_PATH="/usr/include:/usr/include/x86_64-linux-gnu"
          export CPLUS_INCLUDE_PATH="/usr/include:/usr/include/x86_64-linux-gnu"
          export LIBRARY_PATH="/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu"
          
          CLANG_DIR="$WORKDIR/kernel_workspace/clang20/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          echo "у╝ќУ»ЉтЎеС┐АТЂ»:"
          echo "ClangуЅѕТюг: $CLANG_VERSION"
          echo "LLDуЅѕТюг: $LLD_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "paholeуЅѕТюг№╝џТюфт«ЅУБЁ" || echo "paholeуЅѕТюг№╝џ$pahole_version"
          
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="5G"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          
          cd kernel_workspace/common
          
          # сђљТаИт┐ЃС╝ўтїќсђЉуД╗жЎцС║єТъЂтЁХУђЌТЌХуџёТЌХжЌ┤тіФТїЂ wrapper тњїтљјтЈ░ rm С║ЅТіб№╝їуЏ┤ТјЦСй┐уће ccache у╝ќУ»Љ
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld HOSTCFLAGS="-I/usr/include" HOSTLDFLAGS="-L/usr/lib/x86_64-linux-gnu" O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig &&
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld HOSTCFLAGS="-I/usr/include" HOSTLDFLAGS="-L/usr/lib/x86_64-linux-gnu" O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image
          
          echo "тєЁТаИу╝ќУ»Љт«їТѕљ№╝Ђ"
          ccache -s
          df -h

      - name: С┐ЮтГўТќ░уџё ccache у╝ЊтГў
        if: inputs.ccache_update || steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}

      - name: т║ћућеKPMт╣ХС┐«УАЦтєЁТаИ
        if: inputs.vmlinux_debug == false
        run: |
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' && ( "${{ github.event.inputs.ksu_type }}" == "sukisu" || "${{ github.event.inputs.ksu_type }}" == "resukisu" ) ]]; then
            echo "ТГБтюет║ћућеKPMт╣ХС┐«УАЦтєЁТаИ..."
            cd kernel_workspace/common/out/arch/arm64/boot
            curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/latest/download/patch_linux
            chmod +x patch_linux
            ./patch_linux
            rm -f Image
            mv oImage Image
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'kpn' ]]; then
            echo "ТГБтюет║ћућеKP-Nт╣ХС┐«УАЦтєЁТаИ..."
            cd kernel_workspace/common/out/arch/arm64/boot
            wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kptools-linux
            wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kpimg-linux
            chmod +x ./kptools-linux
            ./kptools-linux -p -i ./Image -k ./kpimg-linux -o ./oImage
            rm -f Image
            mv oImage Image
          fi
          
      - name: тЁІжџє AnyKernel3 т╣ХТЅЊтїЁ
        id: create_zip
        if: inputs.vmlinux_debug == false
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "ТюфТЅЙтѕ░тєЁТаИжЋютЃЈТќЄС╗Х№╝їТъёт╗║тЈ»УЃйтЄ║жћЎ"
            exit 1
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KSUNext"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="none"
          fi
          if [[ ${{ github.event.inputs.lz4kd_enable }} == 'true' ]]; then
            wget --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/zram.zip || true
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'kpn' ]]; then
            wget https://github.com/cctv18/KPatch-Next/releases/latest/download/kpn.zip
          fi
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ github.event.inputs.kernel_suffix }}.zip
          else
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ env.KERNEL_NAME }}.zip
          fi
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT
          echo "ућЪТѕљуџё zip ТќЄС╗Х: $AK3_NAME"
          
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ github.event.inputs.kernel_suffix }}
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ env.KERNEL_NAME }}
          fi
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log
          echo "KSU Branch: ${KSU_TYPENAME}" >> ./ak3.log
          echo "KSU Ver: ${KSUVER}" >> ./ak3.log
          echo "susfs: ${{ github.event.inputs.susfs_enable }}" >> ./ak3.log
          echo "KPM: ${{ github.event.inputs.kpm_enable }}" >> ./ak3.log
          echo "LZ4: ${{ github.event.inputs.lz4_enable }}" >> ./ak3.log
          echo "LZ4KD: ${{ github.event.inputs.lz4kd_enable }}" >> ./ak3.log
          echo "IPset: ${{ github.event.inputs.better_net }}" >> ./ak3.log
          echo "BBR&Brutal: ${{ github.event.inputs.bbr_enable }}" >> ./ak3.log
          echo "SSG: ${{ github.event.inputs.ssg_enable }}" >> ./ak3.log
          echo "Re-Kernel: ${{ github.event.inputs.rekernel_enable }}" >> ./ak3.log
          echo "BBG: ${{ github.event.inputs.baseband_guard }}" >> ./ak3.log
          zip -z ../$AK3_NAME < ./ak3.log

      - name: СИіС╝а Ccache У░ЃУ»ЋТЌЦт┐Ќ
        if: always() && inputs.ccache_debug
        uses: actions/upload-artifact@v4
        with:
          name: ccache-debug-log
          path: ${{ github.workspace }}/kernel_workspace/ccache.log
          archive: true

      - name: СИіС╝а ZIP тиЦС╗Х
        if: inputs.vmlinux_debug == false
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip-${{ github.run_id }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    if: inputs.vmlinux_debug == false && needs.build.result == 'success' && needs.build.outputs.ak3name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: уГЅтЙЁ artifact тЄєтцЄт░▒у╗ф
        run: |
          echo "уГЅтЙЁ artifact тЈ»уће..."
          sleep 10
          
      - name: СИІУйй ZIP тиЦС╗Х
        uses: actions/download-artifact@v4
        with:
          pattern: kernel-zip-*
          path: ./release_zips
          merge-multiple: true
          
      - name: жфїУ»ЂСИІУййуџёТќЄС╗Х
        run: |
          echo "СИІУййуџёТќЄС╗ХтѕЌУАе№╝џ"
          ls -la ./release_zips/
          if [ ! -f ./release_zips/AnyKernel3_*.zip ] && [ ! -f ./release_zips/*.zip ]; then
            echo "жћЎУ»»№╝џТюфТЅЙтѕ░ AnyKernel zip ТќЄС╗Х№╝Ђ"
            exit 1
          fi
          # жЄЇтЉйтљЇТЅЙтѕ░уџёуггСИђСИф zip ТќЄС╗ХСИ║ТаЄтЄєтљЇуД░
          ZIP_FILE=$(find ./release_zips -name "AnyKernel3_*.zip" -o -name "*.zip" | head -1)
          if [ -n "$ZIP_FILE" ] && [ ! -f "./release_zips/${{ needs.build.outputs.ak3name }}" ]; then
            cp "$ZIP_FILE" "./release_zips/${{ needs.build.outputs.ak3name }}"
          fi

      - name: У«Йуй«уј»тбЃтЈўжЄЈ
        run: |
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ github.event.inputs.kernel_suffix }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ env.KERNEL_NAME }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          fi
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU Ultra"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KernelSU Next"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KernelSU (Official)"
          else
            KSU_TYPENAME="ТЌатєЁуй«KSU"
          fi
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV
          
      - name: тѕЏт╗║тЈЉтИЃ
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release_notes.md
          ### ­ЪЊ▒ ТгДтіауюЪ ${{ env.KSU_TYPENAME }} SM8650 жђџућетєЁТаИ | Тъёт╗║С┐АТЂ»
          - тєЁТаИуЅѕТюгтЈи: ${{ env.FULL_VERSION }}
          - у╝ќУ»ЉТЌХжЌ┤: ${{ env.TIME_FORM }}
          - Тю║тъІ№╝џТгДтіауюЪжфЂжЙЎ8Gen3жђџуће ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }} тєЁТаИ№╝ѕтЪ║С║јСИђтіа12 ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }} уЅѕт«ўТќ╣OKIТ║љуаЂ№╝Ѕ
          - KSUтѕєТћ»№╝џ${{ env.KSU_TYPENAME }}
          - susfsТћ»ТїЂ№╝џ${{ github.event.inputs.susfs_enable }}
          - KPMТћ»ТїЂ №╝џ${{ github.event.inputs.kpm_enable }}
          - LZ4Тћ»ТїЂ№╝џ${{ github.event.inputs.lz4_enable }}
          - LZ4KDТћ»ТїЂ№╝џ${{ github.event.inputs.lz4kd_enable }}
          - уйЉу╗ютіЪУЃйтбът╝║№╝џ${{ github.event.inputs.better_net }}
          - BBR/Brutal уГЅТІЦтАъТјДтѕХу«ЌТ│ЋТћ»ТїЂ№╝џ${{ github.event.inputs.bbr_enable }}
          - СИЅТўЪSSG IOУ░Ѓт║дтЎеТћ»ТїЂ№╝џ${{ github.event.inputs.ssg_enable }}
          - Re-KernelТћ»ТїЂ№╝џ${{ github.event.inputs.rekernel_enable }}
          - тєЁТаИу║ДтЪ║тИдС┐ЮТіцТћ»ТїЂ№╝џ${{ github.event.inputs.baseband_guard }}
          - ReSukiSUу«АуљєтЎеСИІУйй№╝џ[ReSukiSU_CI](https://github.com/cctv18/ReSukiSU_CI/releases)
          - SukiSU Ultraу«АуљєтЎеСИІУйй№╝џ[SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases)
          - KernelSU Nextу«АуљєтЎеСИІУйй№╝џ[KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next/releases)
          - KSUтјЪуЅѕу«АуљєтЎеСИІУйй№╝џ[KernelSU](https://github.com/tiann/KernelSU/releases)
          
          ### РЈФ№ИЈ ТЏ┤Тќ░тєЁт«╣№╝џ
          - ТЏ┤Тќ░${{ env.KSU_TYPENAME }}УЄ│ТюђТќ░уЅѕТюг№╝ѕ${{ needs.build.outputs.ksuver }}№╝Ѕ
          - тіатЁЦт«їТЋ┤уџёLXC/Dockerуј»тбЃТћ»ТїЂУАЦСИЂ
          - С┐«тцЇт╣Хтљ»ућеС║є SCTP жФўу║ДуйЉу╗юТћ»ТїЂ
          
          ### ­ЪЊІ т«ЅУБЁТќ╣Т│Ћ | Installation Guide
          1. УІЦСйауџёТЅІТю║ти▓у╗Јт«ЅУБЁС║єуггСИЅТќ╣Recovery№╝ѕтдѓTWRP)№╝їтЈ»СИІУййт»╣т║ћТю║тъІуџёAnyKernelтѕиТю║тїЁтљјУ┐ЏтЁЦRecoveryТеАт╝Ј№╝їжђџУ┐ЄRecoveryтѕитЁЦтѕиТю║тїЁтљјжЄЇтљ»У«ЙтцЄ№╝Џ
          2. УІЦСйауџёТЅІТю║С╣ІтЅЇти▓ТюЅ root ТЮЃжЎљ№╝їтЈ»тюеТЅІТю║СИіт«ЅУБЁ[HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher/releases)№╝їтюеHorizonKernelFlasherСИГтѕитЁЦAnyKernelтѕиТю║тїЁт╣ХжЄЇтљ»№╝Џ
          3. УІЦСйаС╣ІтЅЇти▓тѕитЁЦSukiSU UltraтєЁТаИ№╝їСИћSukiSU Ultraу«АуљєтЎети▓ТЏ┤Тќ░УЄ│ТюђТќ░уЅѕТюг№╝їтЈ»тюеSukiSU Ultraу«АуљєтЎеСИГуЏ┤ТјЦтѕитЁЦAnyKernelтѕиТю║тїЁт╣ХжЄЇтљ»№╝Џ
          4. тѕитЁЦТЌаlz4kdУАЦСИЂуЅѕуџётєЁТаИтЅЇУІЦтѕитЁЦУ┐Єlz4kdУАЦСИЂуЅѕуџётєЁТаИ№╝їСИ║жЂ┐тЁЇтЄ║жћЎ№╝їУ»итЁѕтЁ│жЌГzramТеАтЮЌ№╝Џ
          5. ућ▒С║јKernelSUСИіТИИТЏ┤Тќ░С║єтЁЃТеАтЮЌтіЪУЃй№╝їТюђТќ░уЅѕKSUу«АуљєтЎе№╝ѕтїЁТІгжЎцKernelSU NextС╗ЦтцќуџётљётѕєТћ»№╝ЅжюђУдЂжЁЇтљѕтЁЃТеАтЮЌ(metamodule)ТЅЇУЃйТГБтИИТїѓУййТеАтЮЌсђѓуЏ«тЅЇуџётЁЃТеАтЮЌтїЁТІг[meta overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs), [mountify](https://github.com/backslashxx/mountify), [meta magicmount](https://github.com/7a72/meta-magic_mount/), [meta magicmount rs](https://github.com/Tools-cx-app/meta-magic_mount/), [hybrid mount](https://github.com/YuzakiKokuban/meta-hybrid_mount)уГЅсђѓУІЦСйаТў»уггСИђТгАСй┐ућеKSUТѕќтѕџС╗јТЌДуЅѕKSUу«АуљєтЎетЇЄу║ДУЄ│Тќ░уЅѕ№╝їУ»итЁѕт«ЅУБЁСИђСИфтЁЃТеАтЮЌ№╝їУ┐ЎТаитЁХС╗ќТХЅтЈіу│╗у╗ЪТїѓУййуџёТеАтЮЌТЅЇУЃйТГБтИИУ┐љУАї№╝Џ
          6. KernelPatch Next№╝ѕтЇ│KPN№╝ЅТў»СИђСИфуІгуФІС║јKSUуџёKPMт«ъуј░№╝їтЈ»С╗ЦУ┐љУАїтюеС╗╗ТёЈKSU/жЮбтЁиуј»тбЃСИГ№╝ѕСИЇжђѓућеС║јApatch№╝Ѕ№╝їСИћСИЇУЃйСИј(Re)SukiSUтєЁуй«уџёkpmтіЪУЃйтЁ▒тљїСй┐уће№╝їСй┐ућетЅЇУ»иС┐ЮУ»ЂСйауџётєЁТаИТ▓АТюЅтєЁуй«уџёkpmт«ъуј░/С┐«УАЦсђѓ
          
          #### Рђ╗Рђ╗Рђ╗тѕитєЎтєЁТаИТюЅжБјжЎЕ№╝їСИ║жў▓ТГбтЄ║уј░ТёЈтцќт»╝УЄ┤ТЅІТю║тЈўуаќ№╝їтюетѕитЁЦтєЁТаИтЅЇУ»итіАт┐Ёуће[KernelFlasher](https://github.com/capntrips/KernelFlasher)уГЅУй»С╗ХтцЄС╗йbootуГЅтЁ│жћ«тљ»тіетѕєтї║!Рђ╗Рђ╗Рђ╗
          EOF

          # ТЅЙтѕ░т«ъжЎЁуџё zip ТќЄС╗Х
          ZIP_FILE=$(find ./release_zips -name "AnyKernel3_*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            ZIP_FILE=$(find ./release_zips -name "*.zip" | head -1)
          fi
          
          gh release create "${{ env.TAG_HEAD }}-${{ env.TIME }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}" \
            --notes-file release_notes.md \
            "$ZIP_FILE"
