name: 123sctp-new加速版构建 6.1.118 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android14'
  KERNEL_VERSION: '6.1'
  SUB_VERSION: '118'
  KERNEL_NAME: 'android14-11-o-gca13bffobf09'
  CCACHE_KEY: ccache-lxc-6.1.118
  WORKSPACE: /home/runner/work/kernel_workspace

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU,默认ReSukiSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      vmlinux_debug:
        description: '【云端 ABI 排雷】进行纯净组与补丁组的 2x2 正交结构体对比 (跳过普通刷机包打包)'
        required: true
        type: boolean
        default: false
      susfs_enable:
        description: '是否开启susfs(用于增强隐藏环境挂载功能)'
        required: true
        type: boolean
        default: true
      kpm_enable:
        description: '是否开启kpm'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: '是否安装 LZ4KD 补丁'
        required: true
        type: boolean
        default: false
      bbr_enable:
        description: '是否启用bbr算法'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: '是否开启网络功能拓展配置 (包含开启 SCTP)'
        required: true
        type: boolean
        default: true
      ssg_enable:
        description: '是否启用三星SSG IO调度器'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: '是否启用Re-Kernel支持'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: '是否开启内核级基带保护'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: '更新ccache缓存'
        required: true
        type: boolean
        default: false
      ccache_debug:
        description: '是否上传 Ccache调试日志'
        required: true
        type: boolean
        default: false
      kernel_suffix:
        description: '内核后缀(留空默认)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 释放磁盘空间（激进模式）
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-docker-images: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-large-packages: 'true'

      - name: 额外激进清理磁盘
        run: |
          echo "========== 开始激进清理 =========="
          
          sudo apt-mark hold firefox || true
          sudo apt-mark hold libc-bin || true
          sudo apt purge -y man-db || true
          sudo rm -rf /var/lib/man-db/auto-update
          
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/microsoft
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /opt/az
          sudo rm -rf /usr/share/az_
          
          sudo apt clean
          sudo apt autoclean
          sudo apt autoremove --purge -y
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/cache/apt/archives/*.deb
          
          sudo journalctl --vacuum-size=10M
          sudo rm -rf /tmp/* /var/tmp/*
          rm -rf ~/.cache/* ~/.npm ~/.cargo ~/.rustup ~/.local/share/pip
          
          sudo rm -rf /var/lib/docker || true
          sudo rm -rf /var/lib/containerd || true
          
          sudo find / -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          
          echo "========== 清理完成 =========="
          df -h
          FREE_GB=$(df / | awk 'NR==2 {print int($4/1024/1024)}')
          echo "可用空间: ${FREE_GB}GB"

      - name: 安装环境依赖+初始化源码
        run: |
          mkdir -p ${{ env.WORKSPACE }}
          cd ${{ env.WORKSPACE }}
          
          sudo apt update && sudo apt install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev zstd dwarves zip \
            pkg-config aria2 ccache patch tree
          
          echo "========== 磁盘空间检查 =========="
          df -h
          
          aria2c -s16 -x16 https://github.com/cctv18/android_kernel_common_oneplus_sm8650/archive/refs/heads/oneplus/sm8650_b_16.0.0_oneplus12.zip -o common.zip &
          aria2c -s16 -x16 https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip -o clang.zip &
          aria2c -s16 -x16 https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip -o build-tools.zip &
          wait
          
          unzip -q common.zip
          EXTRACTED_DIR=$(ls -d android_kernel_common_oneplus_sm8650-* 2>/dev/null | head -1)
          echo "解压后的目录: $EXTRACTED_DIR"
          
          # 处理可能的嵌套结构
          if [ -d "$EXTRACTED_DIR/common" ]; then
            echo "检测到嵌套结构，正在修复..."
            mkdir -p common
            cp -r $EXTRACTED_DIR/common/* common/
          else
            echo "标准结构，直接移动..."
            mv $EXTRACTED_DIR common
          fi
          
          mkdir -p clang20 && unzip -q clang.zip -d clang20
          unzip -q build-tools.zip
          rm -rf *.zip
          
          rm common/android/abi_gki_protected_exports_* || true
          sed -i 's/ -dirty//g' common/scripts/setlocalversion
          
          echo "========== 源码准备完成 =========="
          ls -la common/ | head -20

      # ================== 新增：诊断 SCTP 源码位置 ==================
      - name: 诊断 SCTP 源码位置
        run: |
          cd ${{ env.WORKSPACE }}
          echo "========== 当前工作目录 =========="
          pwd
          
          echo "========== 查找所有 sctp 目录 =========="
          find . -type d -name "sctp" 2>/dev/null
          
          echo "========== common 目录结构 =========="
          ls -la common/
          
          echo "========== common 下的 net 目录 =========="
          if [ -d "common/net" ]; then
            ls -la common/net/ | head -20
          else
            echo "common/net 目录不存在！"
            echo "正在查找 net 目录..."
            find common -type d -name "net" 2>/dev/null
          fi
          
          echo "========== 检查是否有嵌套 common =========="
          if [ -d "common/common" ]; then
            echo "❌ 发现嵌套的 common 目录！"
            ls -la common/common/
            echo "实际 SCTP 可能在这里:"
            find common/common -type d -name "sctp" 2>/dev/null
          fi
          
          echo "========== 搜索 sysctl.c 文件 =========="
          find . -name "sysctl.c" 2>/dev/null | grep -E "(sctp|net)" | head -10
          
          echo "========== 使用 tree 查看目录结构（前3层） =========="
          tree -L 3 common/ 2>/dev/null || echo "tree 命令不可用，跳过"
          
          echo "========== 检查 gki_defconfig 中的 SCTP 配置 =========="
          grep -i "sctp" common/arch/arm64/configs/gki_defconfig 2>/dev/null || echo "未找到 SCTP 配置"

      - name: 克隆 LXC 补丁仓库
        run: |
          cd ${{ env.WORKSPACE }}
          git clone --depth=1 https://github.com/wings110/8650-lxc-docker.git lxc_fix

      - name: 应用 LXC 补丁
        run: |
          cd ${{ env.WORKSPACE }}
          
          for p in ./lxc_fix/lxc-patches/*.patch; do
            echo "-> 应用补丁: $p"
            patch -p1 -F 3 < "$p" || true
          done

      - name: 创建安全的 SCTP 修复脚本
        run: |
          cd ${{ env.WORKSPACE }}
          
          cat > lxc_fix/lxc-patches/sctp_source_fix_safe.sh << 'SCRIPT_EOF'
          #!/bin/bash
          echo ">>> 正在外科手术式修复 SCTP 核心源码引用（安全模式）..."
          
          # 查找实际的 sctp 目录
          SCTP_DIR=$(find . -type d -name "sctp" -path "*/net/sctp" 2>/dev/null | head -1)
          
          if [ -z "$SCTP_DIR" ]; then
              echo "⚠️ 警告: 未找到 SCTP 源码目录"
              echo "   尝试查找所有可能的路径..."
              find . -type d -name "sctp" 2>/dev/null
              exit 0
          fi
          
          echo "✅ 找到 SCTP 源码目录: $SCTP_DIR"
          
          if [ -f "$SCTP_DIR/sysctl.c" ]; then
              echo "✅ 找到 SCTP 源码，应用 ABI 兼容性修复..."
              sed -i 's/struct netns_sctp \*sn = net->sctp;/struct netns_sctp *sn = \&net->sctp;/g' "$SCTP_DIR/sysctl.c" 2>/dev/null || true
              echo "✅ SCTP 修复完成"
          else
              echo "⚠️ SCTP 源码不完整，跳过修复"
          fi
          SCRIPT_EOF
          chmod +x lxc_fix/lxc-patches/sctp_source_fix_safe.sh

      - name: 执行 SCTP 修复脚本
        run: |
          cd ${{ env.WORKSPACE }}
          cd common
          bash ../lxc_fix/lxc-patches/sctp_source_fix_safe.sh

      # ================== 以下为常规构建流程 ==================
      - name: 配置 ccache 目录
        if: inputs.vmlinux_debug == false
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV

      - name: 载入 ccache 缓存
        if: inputs.vmlinux_debug == false
        uses: actions/cache@v5
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-

      - name: 清理旧 ccache 缓存
        if: inputs.vmlinux_debug == false && inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }} || true

      - name: 添加 KernelSU
        if: inputs.vmlinux_debug == false
        id: ksu_version
        run: |
          cd ${{ env.WORKSPACE }}
          
          if [[ "${{ github.event.inputs.ksu_type }}" == "resukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo "ksuver=ReSukiSU" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.ksu_type }}" == "sukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            echo "ksuver=SukiSU" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.ksu_type }}" == "ksunext" ]]; then
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/main/kernel/setup.sh" | bash -s main
            echo "ksuver=KernelSU-Next" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.ksu_type }}" == "ksu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
            echo "ksuver=KernelSU" >> $GITHUB_OUTPUT
          fi
          
          # 写入 Config
          {
            echo "CONFIG_KSU=y"
            if [[ "${{ github.event.inputs.better_net }}" == "true" ]]; then
              echo "CONFIG_IP_SCTP=y"
            fi
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
          } >> common/arch/arm64/configs/gki_defconfig

      - name: 构建内核镜像
        if: inputs.vmlinux_debug == false
        run: |
          cd ${{ env.WORKSPACE }}
          export PATH="/usr/lib/ccache:$PWD/clang20/bin:$PWD/build-tools/bin:$PATH"
          export C_INCLUDE_PATH="/usr/include:/usr/include/x86_64-linux-gnu"
          
          cd common
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" O=out gki_defconfig
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" O=out Image

      - name: 打包 AnyKernel3
        id: create_zip
        if: inputs.vmlinux_debug == false
        run: |
          cd ${{ env.WORKSPACE }}
          git clone --depth=1 https://github.com/cctv18/AnyKernel3
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          AK3_NAME="AnyKernel3_SCTP_LXC_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}_${{ github.run_id }}.zip"
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: 上传工件
        if: inputs.vmlinux_debug == false
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: ${{ env.WORKSPACE }}/*.zip

  release:
    needs: build
    if: inputs.vmlinux_debug == false && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载工件
        uses: actions/download-artifact@v4
        with:
          name: kernel-zip
          path: ./
      - name: 发布 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "Build-${{ github.run_id }}" ./*.zip \
            --title "欧加真 6.1.118 SCTP-LXC 加速版" \
            --notes "包含 LXC/Docker 补丁与完整环境支持"
