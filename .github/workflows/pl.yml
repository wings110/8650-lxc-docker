name: sctp纯净+补丁加速版构建 6.1.118 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android14'
  KERNEL_VERSION: '6.1'
  SUB_VERSION: '118'
  KERNEL_NAME: 'android14-11-o-gca13bffobf09'
  CCACHE_KEY: ccache-lxc-6.1.118

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU,默认ReSukiSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      vmlinux_debug:
        description: '【云端 ABI 排雷】包含补丁后的结构体差异对比报告 (不打包刷机包)'
        required: true
        type: boolean
        default: false
      susfs_enable:
        description: '是否开启susfs(用于增强隐藏环境挂载功能)'
        required: true
        type: boolean
        default: true
      kpm_enable:
        description: '是否开启kpm'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: '是否安装 LZ4KD 补丁'
        required: true
        type: boolean
        default: false
      bbr_enable:
        description: '是否启用bbr算法'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: '是否开启网络功能拓展配置 (开启 SCTP)'
        required: true
        type: boolean
        default: true
      ssg_enable:
        description: '是否启用三星SSG IO调度器'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: '是否启用Re-Kernel支持'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: '是否开启内核级基带保护'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: '更新ccache缓存'
        required: true
        type: boolean
        default: false
      ccache_debug:
        description: '是否上传 Ccache调试日志'
        required: true
        type: boolean
        default: false
      kernel_suffix:
        description: '内核后缀(留空默认)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 释放磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-docker-images: 'true'

      - name: 安装环境依赖+初始化源码
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          sudo apt update && sudo apt install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev zstd dwarves zip pkg-config aria2
          
          # 并行克隆加速
          aria2c -s16 -x16 https://github.com/cctv18/android_kernel_common_oneplus_sm8650/archive/refs/heads/oneplus/sm8650_b_16.0.0_oneplus12.zip -o common.zip &
          aria2c -s16 -x16 https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip -o clang.zip &
          aria2c -s16 -x16 https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip -o build-tools.zip &
          wait
          
          unzip -q common.zip && mv android_kernel_common_oneplus_sm8650-* common
          mkdir -p clang20 && unzip -q clang.zip -d clang20
          unzip -q build-tools.zip
          rm -rf *.zip
          
          # 净化源码
          rm common/android/abi_gki_protected_exports_* || true
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      # ================== 核心升级：包含补丁的 ABI 排雷逻辑 ==================
      - name: 【云端 ABI 排雷】补丁前后对比
        if: inputs.vmlinux_debug == true
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$WORKDIR/kernel_workspace/clang20/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export C_INCLUDE_PATH="/usr/include:/usr/include/x86_64-linux-gnu"
          
          cd kernel_workspace
          MAKE_CMD="make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang O=out"
          
          echo ">>> 1. 提取【纯净组】结构体状态..."
          cd common
          $MAKE_CMD gki_defconfig && $MAKE_CMD net/core/net_namespace.o net/core/skbuff.o
          pahole -C net out/net/core/net_namespace.o > ../net_clean.txt
          pahole -C sk_buff out/net/core/skbuff.o > ../skb_clean.txt
          
          echo ">>> 2. 应用所有补丁与 LXC 配置..."
          cd ..
          git clone --depth=1 https://github.com/wings110/8650-lxc-docker.git lxc_fix
          # 应用所有补丁库中的 .patch 文件
          for p in ./lxc_fix/lxc-patches/*.patch; do
            echo "正在应用补丁: $p"
            patch -p1 -d common -F 3 < "$p" || true
          done
          
          cd common
          # 开启 SCTP 等配置
          echo "CONFIG_IP_SCTP=y" >> arch/arm64/configs/gki_defconfig
          # 执行关键源码修复脚本
          bash ../lxc_fix/lxc-patches/sctp_source_fix.sh || true
          
          echo ">>> 3. 提取【补丁后】结构体状态..."
          $MAKE_CMD gki_defconfig && $MAKE_CMD net/core/net_namespace.o net/core/skbuff.o
          pahole -C net out/net/core/net_namespace.o > ../net_patched.txt
          pahole -C sk_buff out/net/core/skbuff.o > ../skb_patched.txt
          
          echo ">>> 4. 生成对比报告..."
          cd ..
          diff -u net_clean.txt net_patched.txt > abi_diff_net_report.txt || true
          diff -u skb_clean.txt skb_patched.txt > abi_diff_skb_report.txt || true
          zip abi_analysis_reports.zip *.txt

      - name: 上传排雷分析
        if: inputs.vmlinux_debug == true
        uses: actions/upload-artifact@v4
        with:
          name: abi_analysis_reports
          path: kernel_workspace/abi_analysis_reports.zip

      # ================== 以下为常规构建 (当 debug 为 false 时运行) ==================
      - name: 配置 ccache 目录
        if: inputs.vmlinux_debug == false
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV

      - name: 载入 ccache 缓存
        if: inputs.vmlinux_debug == false
        uses: actions/cache@v5
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-

      - name: 安装 ccache 并清理旧缓存
        if: inputs.vmlinux_debug == false && inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt install -y ccache
          gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }} || true

      - name: 添加 KernelSU/SUSFS/补丁 (常规流)
        if: inputs.vmlinux_debug == false
        id: ksu_version
        run: |
          cd kernel_workspace
          # KSU 安装 (复用你 111.yml 的逻辑)
          if [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo "ksuver=ReSukiSU" >> $GITHUB_OUTPUT
          elif [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            echo "ksuver=SukiSU" >> $GITHUB_OUTPUT
          fi
          
          # 应用 LXC 补丁库内容
          git clone --depth=1 https://github.com/wings110/8650-lxc-docker.git lxc_fix
          for p in ./lxc_fix/lxc-patches/*.patch; do
            patch -p1 -d common -F 3 < "$p" || true
          done
          cd common
          bash ../lxc_fix/lxc-patches/sctp_source_fix.sh || true
          
          # 写入 Config
          {
            echo "CONFIG_KSU=y"
            [[ "${{ github.event.inputs.better_net }}" == "true" ]] && echo "CONFIG_IP_SCTP=y"
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
          } >> arch/arm64/configs/gki_defconfig

      - name: 构建内核镜像 (常规流)
        if: inputs.vmlinux_debug == false
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$WORKDIR/kernel_workspace/clang20/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export C_INCLUDE_PATH="/usr/include:/usr/include/x86_64-linux-gnu"
          cd kernel_workspace/common
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" O=out gki_defconfig
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" O=out Image

      - name: 打包 AnyKernel3
        id: create_zip
        if: inputs.vmlinux_debug == false
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/AnyKernel3
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          AK3_NAME="AnyKernel3_SCTP_LXC_${{ env.KERNEL_VERSION }}_${{ github.run_id }}.zip"
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: 上传工件
        if: inputs.vmlinux_debug == false
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: kernel_workspace/*.zip

  release:
    needs: build
    if: inputs.vmlinux_debug == false && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载工件
        uses: actions/download-artifact@v4
        with:
          name: kernel-zip
          path: ./
      - name: 发布 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "Build-${{ github.run_id }}" ./*.zip --title "欧加真 6.1.118 SCTP-LXC 加速版" --notes "包含 LXC/Docker 补丁与 SCTP 支持"
